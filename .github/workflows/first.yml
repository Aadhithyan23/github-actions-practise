name: First Workflow

on: push

jobs:
    hello:
        runs-on: ubuntu-latest

        steps:
            - uses: action/checkout@v4
            - run: pwd
            - run: ls

            - uses: action/setup-node@v4
              with:
                node-version: 24.15..0

            - run: node --version

            - run: echo "Github actions are really interesting !"

